<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Uploaded Data</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

<h3>Uploaded Data</h3>

<table class="table table-bordered">

    <!-- HEADER -->
    <thead>
    <tr>
        <th th:each="col : ${records[0]}" th:text="${col}"></th>
    </tr>
    </thead>

    <!-- DATA -->
    <tbody>
    <tr th:each="row, iterStat : ${records}" th:if="${iterStat.index > 0}">
        <td th:each="col : ${row}" th:text="${col}"></td>
    </tr>
    </tbody>

</table>

</body>
</html>
