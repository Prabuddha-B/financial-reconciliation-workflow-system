<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Uploaded Data</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

<h3>Uploaded Data</h3>

<table class="table table-bordered">

    <!-- HEADER -->
    <thead>
    <tr>
        <th>Receipt ID</th>
        <th>Reference No</th>
        <th>Payer Name</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Entered By</th>
    </tr>
    </thead>

    <!-- DATA -->
    <tbody>
    <tr th:each="r : ${records}">
        <td th:text="${r.receiptId}"></td>
        <td th:text="${r.referenceNo}"></td>
        <td th:text="${r.payerName}"></td>
        <td th:text="${r.amount}"></td>
        <td th:text="${r.date}"></td>
        <td th:text="${r.enteredBy}"></td>
    </tr>
    </tbody>

</table>

</body>
</html>
