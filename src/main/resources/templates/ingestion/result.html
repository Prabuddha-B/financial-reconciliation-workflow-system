<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Uploaded Data</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>

<body class="container mt-5">

    <h3>Uploaded Data</h3>

    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5>Total Records</h5>
                    <h3 th:text="${total}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5>Valid Records</h5>
                    <h3 th:text="${validCount}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5>Invalid Records</h5>
                    <h3 th:text="${invalidCount}"></h3>
                </div>
            </div>
        </div>

    </div>

    <div class="row mb-3">

        <!-- SEARCH -->
        <div class="col-md-6">
            <input type="text" id="searchInput"
                   class="form-control"
                   placeholder="Search by reference or payer name...">
        </div>

        <!-- FILTER -->
        <div class="col-md-6 text-end">
            <button id="btnAll" class="btn btn-secondary" onclick="setFilter('all')">All</button>
            <button id="btnValid" class="btn btn-success" onclick="setFilter('valid')">Valid</button>
            <button id="btnInvalid" class="btn btn-danger" onclick="setFilter('invalid')">Invalid</button>
        </div>
    </div>

    <p id="noResultsMessage" class="text-center text-danger fw-bold mt-3" style="display:none;">
        No matching records found
    </p>


    <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
        <table class="table table-bordered table-hover">

            <!-- HEADER -->
            <thead class="table-dark" style="position: sticky; top: 0;">
            <tr>
                <th>Receipt ID</th>
                <th>Reference No</th>
                <th>Payer Name</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Entered By</th>
                <th>Error</th>
            </tr>
            </thead>

            <!-- DATA -->
            <tbody>
            <tr th:each="r : ${records}"
                th:classappend="${!r.valid} ? 'table-danger'"
                th:attr="data-valid=${r.valid}">

                <td th:text="${r.receiptId}"></td>
                <td th:text="${r.referenceNo}"></td>
                <td th:text="${r.payerName}"></td>
                <td class="text-end" th:text="${r.amount}" th:classappend="${!r.valid} ? 'text-danger fw-bold'"></td>
                <td th:text="${r.date}"></td>
                <td th:text="${r.enteredBy}"></td>

                <td>
                    <span th:if="${!r.valid}" class="badge bg-danger" th:text="${r.errorMessage}"></span>
                    <span th:if="${r.valid}" class="text-muted">—</span>
                </td>
            </tr>
            </tbody>

        </table>
    </div>

    <!-- JS -->
    <script>

        let currentFilter = "all";
        let currentSearch = "";

        //  Main Filter Engine
        function applyFilters() {
            const rows = document.querySelectorAll("tbody tr");

            let visibleCount = 0;

            rows.forEach(row => {

                const isValid = row.getAttribute("data-valid");
                const text = row.innerText.toLowerCase();

                let matchesFilter = false;
                let matchesSearch = false;

                // Filter Logic
                if (currentFilter === "all") {
                    matchesFilter = true;
                } else if (currentFilter === "valid") {
                    matchesFilter = (isValid === "true");
                } else if (currentFilter === "invalid") {
                    matchesFilter = (isValid === "false");
                }

                // Search Logic
                matchesSearch = text.includes(currentSearch);

                const show = matchesFilter && matchesSearch;

                row.style.display = show ? "" : "none";

                if (show) visibleCount++;
            });

            //  No results message
            const msg = document.getElementById("noResultsMessage");
            if (msg) {
                msg.style.display = (visibleCount === 0) ? "block" : "none";
            }
        }

        //  Search event
        document.addEventListener("DOMContentLoaded", function () {

            const searchInput = document.getElementById("searchInput");

            if (searchInput) {
                searchInput.addEventListener("keyup", function () {
                    currentSearch = this.value.toLowerCase();
                    applyFilters();
                });
            }

        });

        //  Filter Button Click
        function filterTable(type) {
            currentFilter = type;
            applyFilters();
        }

        // Filter Button State
        function setFilter(type) {
            currentFilter = type;

            // remove active
            document.getElementById("btnAll").classList.remove("active");
            document.getElementById("btnValid").classList.remove("active");
            document.getElementById("btnInvalid").classList.remove("active");

            // add active
            if (type === "all") document.getElementById("btnAll").classList.add("active");
            if (type === "valid") document.getElementById("btnValid").classList.add("active");
            if (type === "invalid") document.getElementById("btnInvalid").classList.add("active");

            applyFilters();
        }

    </script>


</body>
</html>
