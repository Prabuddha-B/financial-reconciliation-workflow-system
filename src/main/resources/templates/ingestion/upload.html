<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FRWSS - Upload</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow p-4">
    <h3>Data Ingestion Portal</h3>
    <p class="text-muted">Upload your CSV records to pgAdmin</p>
    <hr>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="POST" action="/upload-csv" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Select CSV File</label>
            <input type="file" name="file" class="form-control" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Upload to Database</button>
    </form>
</div>
</body>
</html>
