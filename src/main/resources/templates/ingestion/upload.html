<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FRWSS - Data Ingestion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
        }

        .drop-area {
            border: 2px dashed #0d6efd;
            transition: background 0.3s, border 0.3s;
            border-radius: 15px;
        }

        .drop-area.dragover {
            background-color: #e9ecef;
            border-color: #0a58ca;
        }

        .card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>

<body class="container py-5">

<div class="text-center mb-5">
    <h1 class="display-5 fw-bold text-dark">FRWSS Portal</h1>
    <p class="lead text-muted">University of Peradeniya - Financial Reconciliation</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow p-4">

            <h3 class="mb-4 text-center">Upload Data File</h3>

            <!-- SUCCESS / ERROR -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- FORM -->
            <form th:action="@{/ingestion/preview}"
                  method="post"
                  enctype="multipart/form-data"
                  onsubmit="return handleUpload()">

                <!-- DATA TYPE -->
                <div class="mb-4">
                    <label for="dataType" class="form-label fw-bold">Select Data Source</label>
                    <select id="dataType" name="dataType" class="form-select" required>
                        <option value="">-- Choose Category --</option>
                        <option value="RECEIPT">Receipts System</option>
                        <option value="PAYROLL">Payroll Records</option>
                        <option value="STOCK">Stock Purchases</option>
                        <option value="ACCOUNTING">Accounting Master Ledger</option>
                    </select>
                </div>

                <!-- DROP AREA -->
                <div id="dropArea" class="drop-area p-5 text-center mb-3" style="cursor:pointer;">
                    <p class="mb-2">Drag & Drop file here</p>
                    <p class="text-muted small">or click to browse (CSV only)</p>

                    <input type="file"
                           id="fileInput"
                           name="file"
                           class="form-control"
                           hidden
                           required
                           accept=".csv">
                </div>

                <!-- FILE INFO -->
                <p id="fileName" class="text-primary fw-bold text-center"></p>
                <p id="fileError" class="text-danger small text-center"></p>

                <!-- BUTTON -->
                <button id="uploadBtn"
                        type="submit"
                        class="btn btn-primary w-100 py-2 fw-bold">
                    Generate Preview
                </button>

                <p id="uploadStatus" class="text-center text-muted mt-2 small"></p>

            </form>
        </div>

    </div>
</div>

<!-- SCRIPT -->
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const dropArea = document.getElementById("dropArea");
        const fileInput = document.getElementById("fileInput");

        // click open file picker
        dropArea.addEventListener("click", () => fileInput.click());

        // drag over
        dropArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropArea.classList.add("dragover");
        });

        // drag leave
        dropArea.addEventListener("dragleave", () => {
            dropArea.classList.remove("dragover");
        });

        // drop file (SAFE VERSION)
        dropArea.addEventListener("drop", (e) => {
            e.preventDefault();
            dropArea.classList.remove("dragover");

            const dt = new DataTransfer();
            dt.items.add(e.dataTransfer.files[0]);
            fileInput.files = dt.files;

            handleFileSelection(fileInput.files[0]);
        });

        // manual file select
        fileInput.addEventListener("change", function () {
            handleFileSelection(this.files[0]);
        });
    });

    // FILE VALIDATION
    function handleFileSelection(file) {

        const fileName = document.getElementById("fileName");
        const fileError = document.getElementById("fileError");

        fileError.innerText = "";

        if (!file) return;

        const extension = file.name.split(".").pop().toLowerCase();

        if (extension !== "csv") {
            fileName.innerText = "";
            fileError.innerText = "Please upload a CSV file only.";
            document.getElementById("fileInput").value = "";
            return;
        }

        fileName.innerText = "Selected: " + file.name;
    }

    // FORM SUBMIT GUARD
    function handleUpload() {

        const fileInput = document.getElementById("fileInput");
        const uploadBtn = document.getElementById("uploadBtn");
        const status = document.getElementById("uploadStatus");

        if (!fileInput.files.length) {
            document.getElementById("fileError").innerText = "Please select a file";
            return false;
        }

        uploadBtn.disabled = true;
        status.innerText = "Processing File for Preview...";

        return true;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
