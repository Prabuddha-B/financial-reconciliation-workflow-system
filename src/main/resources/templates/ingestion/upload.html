<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Upload File</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

    <h2>Upload Data File</h2>

    <div class="container mt-5">

        <!-- Success/Error Text-->
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/ingestion/upload}"
              action="/ingestion/upload"
              method="post"
              enctype="multipart/form-data"
              onsubmit="return handleUpload()">

            <div class="mb-3">
                <label for="dataType">Select Data Type</label>

                <select id="dataType" name="dataType" class="form-select" required>
                    <option value="">-- Select Type --</option>
                    <option value="RECEIPT">Receipts</option>
                    <option value="PAYROLL">Payroll</option>
                    <option value="STOCK">Stock Purchases</option>
                    <option value="ACCOUNTING">Accounting</option>
                </select>
            </div>

            <!-- Drag and Drop -->
            <div id="dropArea"
                 class="border border-2 border-primary p-5 text-center rounded mb-3"
                 style="cursor:pointer;">

                <p class="mb-2">Drag & Drop file here</p>
                <p class="text-muted">or click to select file</p>

                <input type="file"
                       id="fileInput"
                       name="file"
                       class="form-control"
                       hidden
                       required
                       accept=".csv,.xlsx">
            </div>

            <!-- Feedback -->
            <p id="fileName" class="text-success fw-bold"></p>
            <p id="fileError" class="text-danger fw-bold"></p>

            <button id="uploadBtn" type="submit" class="btn btn-primary">
                Upload
            </button>

            <p id="uploadStatus" class="text-info mt-2"></p>

        </form>
    </div>

    <!-- JS -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const dropArea = document.getElementById("dropArea");
            const fileInput = document.getElementById("fileInput");

            dropArea.addEventListener("click", () => fileInput.click());

            dropArea.addEventListener("dragover", (e) => {
                e.preventDefault();
                dropArea.classList.add("bg-light");
            });

            dropArea.addEventListener("dragleave", () => {
                dropArea.classList.remove("bg-light");
            });

            dropArea.addEventListener("drop", (e) => {
                e.preventDefault();
                dropArea.classList.remove("bg-light");

                const file = e.dataTransfer.files[0];
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;

                handleFileSelection(file);
            });

            fileInput.addEventListener("change", function () {
                handleFileSelection(this.files[0]);
            });
        });

        // Validates selected file type (CSV or XLSX only)
        function handleFileSelection(file) {

            const fileName = document.getElementById("fileName");
            const fileError = document.getElementById("fileError");

            fileError.innerText = "";

            if (!file) return;

            const allowedTypes = ["csv", "xlsx"];
            const extension = file.name.split(".").pop().toLowerCase();

            if (!allowedTypes.includes(extension)) {
                fileName.innerText = "";
                fileError.innerText = "Invalid file type. Only CSV or XLSX allowed.";
                document.getElementById("fileInput").value = "";
                return;
            }

            fileName.innerText = "Selected: " + file.name;
        }

        // Form Submit Validation
        function handleUpload() {

            const fileInput = document.getElementById("fileInput");
            const uploadBtn = document.getElementById("uploadBtn");
            const status = document.getElementById("uploadStatus");

            if (!fileInput.files.length) {
                document.getElementById("fileError").innerText = "Please select a file";
                return false;
            }

            uploadBtn.disabled = true;
            status.innerText = "Uploading...";

            return true;
        }
    </script>
</body>
</html>
