<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload File</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

<h2 class="mb-4">Upload Data File</h2>
<p class="text-muted">Upload receipt CSV/XLSX files for validation or payroll CSV files for database ingestion.</p>

<div class="container mt-4">

    <div th:if="${uploadError}" class="alert alert-danger" th:text="${uploadError}"></div>

    <form action="/ingestion/upload"
          method="post"
          enctype="multipart/form-data"
          onsubmit="return handleUpload()">

        <!-- DRAG & DROP AREA -->
        <div id="dropArea"
             class="border border-2 border-primary p-5 text-center rounded mb-3"
             style="cursor:pointer;">

            <p class="mb-2">Drag & Drop file here</p>
            <p class="text-muted">or click to select a receipt CSV/XLSX or payroll CSV file</p>

            <input type="file" id="fileInput" name="file"
                   class="form-control"
                   hidden
                   required>
        </div>

        <!-- FILE NAME -->
        <p id="fileName" class="text-success fw-bold"></p>

        <!-- ERROR MESSAGE -->
        <p id="fileError" class="text-danger fw-bold"></p>

        <!-- UPLOAD BUTTON -->
        <button id="uploadBtn" class="btn btn-primary">
            Upload
        </button>

        <!-- STATUS -->
        <p id="uploadStatus" class="text-info mt-2"></p>

    </form>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const dropArea = document.getElementById("dropArea");
        const fileInput = document.getElementById("fileInput");

        dropArea.addEventListener("click", () => fileInput.click());

        dropArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropArea.classList.add("bg-light");
        });

        dropArea.addEventListener("dragleave", () => {
            dropArea.classList.remove("bg-light");
        });

        dropArea.addEventListener("drop", (e) => {
            e.preventDefault();
            dropArea.classList.remove("bg-light");

            fileInput.files = e.dataTransfer.files;
            handleFileSelection(fileInput.files[0]);
        });

        fileInput.addEventListener("change", function () {
            handleFileSelection(this.files[0]);
        });
    });

    // File validation
    function handleFileSelection(file) {

        const fileName = document.getElementById("fileName");
        const fileError = document.getElementById("fileError");

        fileError.innerText = "";

        if (!file) return;

        const allowed = ["csv", "xlsx"];
        const ext = file.name.split(".").pop().toLowerCase();

        if (!allowed.includes(ext)) {
            fileName.innerText = "";
            fileError.innerText = "Only receipt CSV/XLSX or payroll CSV files are allowed.";
            document.getElementById("fileInput").value = "";
            return;
        }

        fileName.innerText = "Selected: " + file.name;
    }

    // upload validation
    function handleUpload() {

        const fileInput = document.getElementById("fileInput");
        const status = document.getElementById("uploadStatus");

        if (!fileInput.files.length) {
            document.getElementById("fileError").innerText = "Please select a file";
            return false;
        }

        status.innerText = "Uploading...";
        document.getElementById("uploadBtn").disabled = true;

        return true;
    }
</script>

</body>
</html>
